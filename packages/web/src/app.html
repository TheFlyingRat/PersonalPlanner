<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
		<link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
		<link rel="preload" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans/index.css" as="style" />
		<link rel="preload" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono/index.css" as="style" />
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-sans/index.css">
		<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fontsource/geist-mono/index.css">
		<style>
			/* Critical inline CSS — prevents FOUC / white flash */
			:root {
				--color-bg: #FAFAFA;
				--color-surface: #FFFFFF;
				--color-text: #09090B;
				--color-text-secondary: #71717A;
				--color-text-tertiary: #A1A1AA;
				--color-accent: #6366F1;
				--color-border: #E4E4E7;
				--font-sans: 'Geist Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				--font-mono: 'Geist Mono', ui-monospace, 'SF Mono', SFMono-Regular, monospace;
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--color-bg: #0C0C0E;
					--color-surface: #16161A;
					--color-text: #FAFAFA;
					--color-text-secondary: #A1A1AA;
					--color-text-tertiary: #52525B;
					--color-accent: #818CF8;
					--color-border: #27272A;
				}
			}
			body {
				margin: 0;
				background-color: var(--color-bg);
				color: var(--color-text);
				font-family: var(--font-sans);
			}
			/* Font-display swap for CDN fonts */
			@font-face {
				font-family: 'Geist Sans';
				font-display: swap;
				src: local('Geist Sans');
			}
			@font-face {
				font-family: 'Geist Mono';
				font-display: swap;
				src: local('Geist Mono');
			}
			/* App shell — shown until SvelteKit hydrates */
			.loading-shell {
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				background-color: var(--color-bg);
				color: var(--color-text-tertiary);
				font-family: var(--font-sans);
				font-size: 0.875rem;
				gap: 8px;
			}
			.loading-shell-spinner {
				width: 18px;
				height: 18px;
				border: 2px solid var(--color-border);
				border-top-color: var(--color-accent);
				border-radius: 50%;
				animation: shell-spin 0.6s linear infinite;
			}
			@keyframes shell-spin {
				to { transform: rotate(360deg); }
			}
			@media (prefers-reduced-motion: reduce) {
				.loading-shell-spinner { animation: none; }
			}
			body.hydrated .loading-shell { display: none; }
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<a href="#main-content" class="skip-link" style="position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0">Skip to main content</a>
		<div class="loading-shell" aria-hidden="true">
			<div class="loading-shell-spinner"></div>
			<span>Loading Cadence...</span>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
