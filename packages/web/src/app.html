<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#6366F1" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#818CF8" media="(prefers-color-scheme: dark)" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<link rel="manifest" href="/manifest.json" />
		<link rel="icon" type="image/svg+xml" href="/icons/icon-192.svg" />
		<link rel="apple-touch-icon" href="/icons/icon-192.svg" />
		<style>
			/* Critical inline CSS — prevents FOUC / white flash */
			:root {
				--color-bg: #FAFAFA;
				--color-surface: #FFFFFF;
				--color-text: #09090B;
				--color-text-secondary: #71717A;
				--color-text-tertiary: #A1A1AA;
				--color-accent: #6366F1;
				--color-border: #E4E4E7;
				--font-sans: 'Geist Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				--font-mono: 'Geist Mono', ui-monospace, 'SF Mono', SFMono-Regular, monospace;
			}
			@media (prefers-color-scheme: dark) {
				:root {
					--color-bg: #0C0C0E;
					--color-surface: #16161A;
					--color-text: #FAFAFA;
					--color-text-secondary: #A1A1AA;
					--color-text-tertiary: #52525B;
					--color-accent: #818CF8;
					--color-border: #27272A;
				}
			}
			body {
				margin: 0;
				background-color: var(--color-bg);
				color: var(--color-text);
				font-family: var(--font-sans);
			}
			/* Font-display swap for CDN fonts */
			@font-face {
				font-family: 'Geist Sans';
				font-display: swap;
				src: local('Geist Sans');
			}
			@font-face {
				font-family: 'Geist Mono';
				font-display: swap;
				src: local('Geist Mono');
			}
			/* App shell — shown until SvelteKit hydrates */
			.loading-shell {
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				background-color: var(--color-bg);
				color: var(--color-text-tertiary);
				font-family: var(--font-sans);
				font-size: 0.875rem;
				gap: 8px;
			}
			.loading-shell-spinner {
				width: 18px;
				height: 18px;
				border: 2px solid var(--color-border);
				border-top-color: var(--color-accent);
				border-radius: 50%;
				animation: shell-spin 0.6s linear infinite;
			}
			@keyframes shell-spin {
				to { transform: rotate(360deg); }
			}
			@media (prefers-reduced-motion: reduce) {
				.loading-shell-spinner { animation: none; }
			}
			body.hydrated .loading-shell { display: none; }
			/* Hide skip link until app hydrates */
			.skip-link { position: absolute; left: -9999px; z-index: 9999; }
			body.hydrated .skip-link { position: absolute; left: -9999px; }
			body.hydrated .skip-link:focus { left: var(--space-3, 12px); top: var(--space-3, 12px); }
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<a href="#main-content" class="skip-link">Skip to main content</a>
		<div class="loading-shell" aria-hidden="true">
			<div class="loading-shell-spinner"></div>
			<span>Loading Cadence...</span>
		</div>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
